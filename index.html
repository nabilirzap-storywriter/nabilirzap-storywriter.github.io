<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Name Vault — Aurora Edition V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div id="toast">Notifikasi</div>

    <div class="app-container">
        
        <aside class="glass-panel sidebar">
            <h1>The Vault</h1>
            <div class="lore-box">
                Sistem Arsip Identitas Eksklusif.<br>
                Curator: <span id="admin-trigger" style="color: #fff; font-weight:800; cursor:pointer;">@n4bilirzap.ip</span>
            </div>
            
            <div class="nav-menu">
                <button class="nav-btn active" data-target="all-section">All Identities</button>
                <button class="nav-btn" data-target="top-section">Leaderboard (Top 50)</button>
                <button class="nav-btn" data-target="release-section">New Release</button>
                <button class="nav-btn" data-target="add-section" style="border-color: var(--gold); color: var(--gold);">Publish Name</button>
            </div>
        </aside>

        <main class="glass-panel main-content">
            
            <div id="all-section" class="section active">
                <h2 class="section-title">All Identities <span id="total-count" style="font-size: 1rem; color: var(--gold); background: rgba(255,189,89,0.1); padding: 5px 15px; border-radius: 20px; margin-left: 10px;">Total: 0</span></h2>
                <input type="text" id="search-input" class="search-bar" placeholder="Cari identitas...">
                <div id="all-list" class="list-wrapper"></div>
            </div>

            <div id="top-section" class="section">
                <h2 class="section-title">Leaderboard (Top 50)</h2>
                <div id="top-list" class="list-wrapper"></div>
            </div>

            <div id="release-section" class="section">
                <h2 class="section-title">New Release</h2>
                
                <h3 style="margin-bottom: 15px; color: var(--gold);">⭐ Top 5 Recommended</h3>
                <div id="recommended-list" class="list-wrapper" style="margin-bottom: 40px;"></div>

                <h3 style="margin-bottom: 15px; color: var(--liquid-2);">🆕 7 New Publish Name</h3>
                <div id="newly-added-list" class="list-wrapper"></div>
            </div>

            <div id="add-section" class="section">
                <h2 class="section-title">Publish Protocol</h2>
                <input type="text" id="new-name-input" class="input-name" placeholder="Masukkan identitas unik...">
                <button id="submit-btn" class="nav-btn" style="width: 100%; text-align: center; border-color: var(--gold); color: var(--gold);">INITIATE PUBLISH</button>
                
                <div id="progress-container" style="display: none; margin-top: 20px;">
                    <p id="waiting-text" style="color: var(--text-muted); text-align: center; margin-bottom: 10px;">Sinkronisasi Server Berjalan...</p>
                    <div style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Main Queue</span> <span id="time-publish" style="color:var(--gold)">5:00</span></div>
                        <div style="width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:10px;"><div id="fill-publish" style="width:0%; height:100%; background:var(--gold); transition:1s;"></div></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <nav class="glass-panel mobile-bottom-nav">
        <button class="mob-nav-btn active" data-target="all-section"><span>📄</span><span>All</span></button>
        <button class="mob-nav-btn" data-target="top-section"><span>🏆</span><span>Top</span></button>
        <button class="mob-nav-btn" data-target="release-section"><span>🔥</span><span>New</span></button>
        <button class="mob-nav-btn" data-target="add-section"><span>✨</span><span>Add</span></button>
    </nav>

    <script type="module" src="main.js"></script>
</body>
</html>
